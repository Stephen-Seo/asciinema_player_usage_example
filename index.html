<head>
  <link rel="stylesheet" type="text/css" href="/asciinema_player_latest/asciinema-player.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    div#demo {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="demo"></div>
  <script src="/asciinema_player_latest/asciinema-player.min.js"></script>
  <script src="/pako_latest/pako.min.js"></script>
  <script>
    "use strict";

    async function fetch_and_ungzip_demo(path) {
      try {
        const response = await fetch(path);
        if (!response.ok) {
          throw new Error(`Response status: ${response.status}`);
        }

        const data = await response.bytes();

        //console.log("Inflating...");

        const inflate = new pako.Inflate({to: "string"});

        inflate.push(data, true);
        if (inflate.err) { throw new Error(inflate.err); }

        //console.log("Inflated.");
        //console.log(inflate.result);

        return inflate.result;
      } catch (error) {
        consoe.error(error.message);
      }
    }

    AsciinemaPlayer.create({data: fetch_and_ungzip_demo('/demo.cast.gz')}, document.getElementById('demo'), {"fit": "both"});
  </script>
</body>
